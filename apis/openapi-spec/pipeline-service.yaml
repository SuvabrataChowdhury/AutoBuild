openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
tags:
- name: Pipeline Build
  description: Operations related to builds of a pipeline
- name: Pipeline
  description: Operations related to pipeline
paths:
  /api/v1/pipeline/{pipelineId}:
    get:
      tags:
      - Pipeline
      summary: Get a pipeline
      operationId: getPipelineById
      parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
      security:
      - bearerAuth: []
    put:
      tags:
      - Pipeline
      summary: "[Experimental]: Update a pipeline"
      description: API to update pipeline. It's currently under development. Do not
        use it!
      operationId: updatePipeline
      parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pipeline"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
      deprecated: true
      security:
      - bearerAuth: []
    delete:
      tags:
      - Pipeline
      summary: Delete a pipeline
      operationId: deletePipeline
      parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
      security:
      - bearerAuth: []
    patch:
      tags:
      - Pipeline
      summary: "[Experimental]: Update a pipeline"
      description: API to update pipeline. It's currently under development. Do not
        use it!
      operationId: modifyPipeline
      parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pipeline"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
      deprecated: true
      security:
      - bearerAuth: []
  /api/v1/pipeline:
    get:
      tags:
      - Pipeline
      summary: Get all pipelines
      operationId: getAllPipelines
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pipeline"
      security:
      - bearerAuth: []
    post:
      tags:
      - Pipeline
      summary: Create a pipeline
      operationId: createPipeline
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pipeline"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pipeline"
      security:
      - bearerAuth: []
  /api/v1/execute/pipeline:
    post:
      tags:
      - Pipeline
      summary: Execute a pipeline
      operationId: executePipeline
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineExecuteRequest"
        required: true
      responses:
        "203":
          description: Non-Authoritative Information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineBuild"
      security:
      - bearerAuth: []
  /api/v1/stage/build/logs/{stageBuildId}:
    get:
      tags:
      - Stage Build
      summary: Get the logs related to a stage build
      operationId: getStageBuildLogs
      parameters:
      - name: stageBuildId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/v1/pipeline/build:
    get:
      tags:
      - Pipeline Build
      summary: Get all pipeline builds
      operationId: getAllBuilds
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineBuild"
      security:
      - bearerAuth: []
  /api/v1/pipeline/build/{pipelineBuildId}:
    get:
      tags:
      - Pipeline Build
      summary: Get a pipeline build
      operationId: getPipelineBuild
      parameters:
      - name: pipelineBuildId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineBuild"
      security:
      - bearerAuth: []
    delete:
      tags:
      - Pipeline Build
      summary: Delete a pipeline build
      operationId: deletePipelineBuild
      parameters:
      - name: pipelineBuildId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
      security:
      - bearerAuth: []
components:
  schemas:
    Pipeline:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        stages:
          type: array
          items:
            $ref: "#/components/schemas/Stage"
      required:
      - name
      - stages
    Stage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        scriptType:
          type: string
        command:
          type: string
      required:
      - command
      - name
      - scriptType
    PipelineExecuteRequest:
      type: object
      properties:
        pipelineId:
          type: string
          format: uuid
      required:
      - pipelineId
    PipelineBuild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pipelineId:
          type: string
          format: uuid
        pipelineName:
          type: string
        currentState:
          type: string
          enum:
          - WAITING
          - RUNNING
          - SUCCESS
          - FAILED
        stageBuilds:
          type: array
          items:
            $ref: "#/components/schemas/StageBuild"
    StageBuild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        stageId:
          type: string
          format: uuid
        stageName:
          type: string
        currentState:
          type: string
          enum:
          - WAITING
          - RUNNING
          - SUCCESS
          - FAILED
          - STOPPED
  securitySchemes:
    bearerAuth:
      type: http
      description: "JWT authentication. Enter token as: Bearer <token>"
      scheme: bearer
      bearerFormat: JWT
